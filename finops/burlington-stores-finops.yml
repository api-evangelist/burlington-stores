notes: |
  Burlington Stores does not publish a public, general-purpose developer API or developer pricing.
  Customer-facing digital surfaces (storefront, store locator, gift cards) are consumer products
  rather than chargeable APIs. Where APIs exist (e.g. for vendors, EDI, or carrier integrations) they
  are governed by private B2B contracts and not by a self-service developer plan.
principles:
  - name: Visibility
    description: No API spend to make visible because no public API is published. Procurement / facilities / IT
      visibility for this entity is handled through standard vendor-management tooling, not a developer-cost surface.
  - name: Allocation
    description: Not applicable to API consumption. Corporate spend allocation is handled by the publisher's
      standard accounting and cost-center processes.
  - name: Optimization
    description: Not applicable to API consumption. Standard procurement-side optimization (contract negotiation,
      consolidated buying) applies if the entity is engaged commercially.
  - name: Accountability
    description: Not applicable to API consumption. Corporate accountability is governed by the publisher's
      enterprise procurement and finance functions.
