description: FOCUS-aligned FinOps scaffold for Burlington Stores. The provider does not publish a metered
  developer API or chargeable API surface, so this artifact captures the corporate publisher and service
  category for cataloging purposes only — there are no API meters, FOCUS columns are minimal, and consumers
  should treat this as a placeholder.
